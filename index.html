<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {

  }
  .app { max-width: 1440px; margin: 0 auto; padding: 24px 16px 40px; }
  .header { display: flex; flex-direction: column; justify-content: space-between; gap: 8px; margin-bottom: 24px; }
  .title {
    margin: 0;
    font-family: "Arial Black", Impact, Haettenschweiler, "Segoe UI Black", sans-serif;
    font-size: clamp(38px, 7vw, 78px);
    font-weight: 900;
    letter-spacing: -0.045em;
    line-height: 1.02;
  }
  .subtitle { color: rgba(255,255,255,0.48); font-size: 12px; letter-spacing: 0.5px; margin-top: 6px; }
  .feed { font-size: 12px; color: rgba(255,255,255,0.50); align-self: flex-start; }
  .asset-row { display: flex; gap: 8px; flex-wrap: wrap; margin: -12px 0 20px; }
  .asset-btn {
    background: #000000;
    color: rgba(255,255,255,0.55);
    border: 1px solid rgba(255,255,255,0.10);
    padding: 8px 12px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.4px;
    cursor: pointer;
  }
  .asset-btn.active { color: #ffffff; background: rgba(255,255,255,0.08); }
  .grid-top { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; margin-bottom: 24px; }
  .grid-panels { display: grid; grid-template-columns: 1fr; gap: 24px; }
  .box, .panel { border: 1px solid rgba(255,255,255,0.10); padding: 16px; background: #000000; content-visibility: auto; contain-intrinsic-size: 120px; }
  .box-label, .panel-title { font-size: 12px; color: rgba(255,255,255,0.40); letter-spacing: 0.35px; }
  .box-label { margin-bottom: 4px; }
  .panel-title { margin-bottom: 12px; }
  .box-value { font-size: 18px; line-height: 1.25; }
  .box-sub { font-size: 12px; color: rgba(255,255,255,0.50); margin-top: 2px; }
  .tone { display: inline-block; padding: 2px 8px; border: 1px solid rgba(255,255,255,0.10); }
  .tone-expansion, .tone-bull { color: rgb(110, 231, 183); border-color: rgba(16,185,129,0.30); background: rgba(16,185,129,0.10); }
  .tone-balance { color: rgb(252, 211, 77); border-color: rgba(245,158,11,0.30); background: rgba(245,158,11,0.10); }
  .tone-transition, .tone-value, .tone-bear { color: rgb(248, 113, 113); border-color: rgba(239,68,68,0.30); background: rgba(239,68,68,0.10); }
  .tone-premium { color: rgb(196, 181, 253); border-color: rgba(139,92,246,0.35); background: rgba(139,92,246,0.12); }
  .row { display: flex; justify-content: space-between; gap: 12px; font-size: 14px; padding: 4px 0; }
  .row-left { color: rgba(255,255,255,0.60); }
  .row-right { color: #ffffff; text-align: right; }
  .warn { border: 1px solid rgba(245,158,11,0.35); color: rgb(252, 211, 77); padding: 10px 12px; font-size: 12px; margin-bottom: 16px; display: none; }
  .footnote { color: rgba(255,255,255,0.36); font-size: 11px; line-height: 1.45; margin-top: 20px; }
  @media (min-width: 640px) {
    .header { flex-direction: row; align-items: center; }
    .feed { align-self: center; padding-top: 0; }
  }
  @media (min-width: 768px) {
    .grid-top { grid-template-columns: repeat(4, minmax(0, 1fr)); }

  }

const FALLBACK_SOXX_PRICES = FALLBACK_SOXX_HISTORY.map((point) => point.price);

const state = {
  price: ASSET_CONFIG.soxx.fallbackPrice,
  priceSource: "Uploaded CSV fallback",
  feedStatus: "READY",
  assetKey: "soxx",
  lastUpdated: null,
  warning: "",
  prices: FALLBACK_SOXX_PRICES.slice(),
  historyPoints: FALLBACK_SOXX_HISTORY.slice(),
  monthlyPivot: null,
  zScore: null,
  percentB: null,
};

function format(v) { return Number(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function formatWhole(v) { return Math.round(Number(v)).toLocaleString(undefined, { maximumFractionDigits: 0 }); }
function cleanPrices(values) { return values.filter((v) => Number.isFinite(v) && v > 0); }
function row(left, right) { return `<div class="row"><span class="row-left">${left}</span><span class="row-right">${right}</span></div>`; }

function calcMean(values) { return values.reduce((a, b) => a + b, 0) / values.length; }
function calcStd(values, mean) {
  const variance = values.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / values.length;
  return Math.sqrt(variance);
}
function calcZScore(prices, lookback = 30) {
  const clean = cleanPrices(prices);
  if (clean.length < lookback) return null;
  const slice = clean.slice(-lookback);
  const mean = calcMean(slice);
  const std = calcStd(slice, mean);
  const last = clean[clean.length - 1];
  return std === 0 ? 0 : (last - mean) / std;
}
function calcBollingerPercentB(prices, lookback = 20, multiplier = 2) {
  const clean = cleanPrices(prices);
  if (clean.length < lookback) return null;
  const slice = clean.slice(-lookback);
  const mean = calcMean(slice);
  const std = calcStd(slice, mean);
  const upper = mean + multiplier * std;
  const lower = mean - multiplier * std;
  const last = clean[clean.length - 1];
  return upper === lower ? 0.5 : (last - lower) / (upper - lower);
}
function calcMonthlyPivot(historyPoints) {
  const clean = Array.isArray(historyPoints)
    ? historyPoints.filter((p) => p && Number.isFinite(p.timestamp) && Number.isFinite(p.price) && p.price > 0).sort((a,b) => a.timestamp - b.timestamp)
    : [];
  if (clean.length < 30) return null;
  const latestDate = new Date(clean[clean.length - 1].timestamp);
  const currentMonthStart = Date.UTC(latestDate.getUTCFullYear(), latestDate.getUTCMonth(), 1);
  const previousMonthStart = Date.UTC(latestDate.getUTCFullYear(), latestDate.getUTCMonth() - 1, 1);
  const previousMonth = clean.filter((p) => p.timestamp >= previousMonthStart && p.timestamp < currentMonthStart);
  if (previousMonth.length < 3) return null;
  const high = Math.max(...previousMonth.map((p) => p.price));
  const low = Math.min(...previousMonth.map((p) => p.price));
  const close = previousMonth[previousMonth.length - 1].price;
  return (high + low + close) / 3;
}
function refreshIndicators() {
  state.zScore = calcZScore(state.prices, 30);
  state.percentB = calcBollingerPercentB(state.prices, 20, 2);
  state.monthlyPivot = calcMonthlyPivot(state.historyPoints);
}
function getStatState(zScore, percentB) {
  if (zScore === null || percentB === null) return "NEUTRAL";
  if (zScore < -1.5 && percentB < 0.2) return "OVERSOLD";
  if (zScore > 1.5 && percentB > 0.8) return "OVERBOUGHT";
  return "NEUTRAL";
}
function getZone(price) {
  if (price >= YEARLY_PIVOTS.R3) return "FROTH";
  if (price >= YEARLY_PIVOTS.R2) return "CONVEXITY";
  if (price >= YEARLY_PIVOTS.R1) return "BREAKOUT";
  if (price >= YEARLY_PIVOTS.P) return "BALANCE";
  if (price >= YEARLY_PIVOTS.S1) return "RECOVERY";
  return "VALUE";
}
function getSignal(price, statState) {
  if (statState === "OVERSOLD" && price <= YEARLY_PIVOTS.P) return "BUY";
  if (price < YEARLY_PIVOTS.P) return "BUY";
  if (price >= YEARLY_PIVOTS.R3) return "DISTRIBUTE";
  if (price >= YEARLY_PIVOTS.R2) return "PROTECT";
  if (price >= YEARLY_PIVOTS.R1) return "MAINTAIN";
  return "HOLD";
}
function getConfidence(price, zScore, percentB) {
  let s = 25;
  if (price <= YEARLY_PIVOTS.S3) s = 92;
  else if (price <= YEARLY_PIVOTS.S2) s = 86;
  else if (price <= YEARLY_PIVOTS.S1) s = 76;
  else if (price < YEARLY_PIVOTS.P) s = 62;
  else if (price < YEARLY_PIVOTS.R1) s = 45;
  else if (price < YEARLY_PIVOTS.R2) s = 28;
  else if (price < YEARLY_PIVOTS.R3) s = 18;
  else s = 10;
  if (zScore !== null && percentB !== null) {
    if (zScore < -1.5 && percentB < 0.2) s += 10;
    else if (zScore < -1.0 && percentB < 0.3) s += 5;
    else if (zScore > 1.5 && percentB > 0.8) s -= 10;
  }
  return Math.max(0, Math.min(100, Math.round(s)));
}
function getBand(score) {
  if (score >= 85) return "HIGH-CONVICTION";
  if (score >= 70) return "STRONG";
  if (score >= 50) return "CONSTRUCTIVE";
  if (score >= 30) return "FORMING";
  return "NO ENTRY EDGE";
}
function getMonthlyPivotState(price) {
  const pivot = Number.isFinite(state.monthlyPivot) ? state.monthlyPivot : YEARLY_PIVOTS.P;
  return price >= pivot ? "BULLISH" : "BEARISH";
}
function toneClass(zone) {
  if (zone === "FROTH" || zone === "CONVEXITY") return "tone tone-premium";
  if (zone === "BREAKOUT") return "tone tone-expansion";
  if (zone === "BALANCE") return "tone tone-balance";
  return "tone tone-value";
}
function monthlyPivotToneClass(price) { return getMonthlyPivotState(price) === "BULLISH" ? "tone tone-bull" : "tone tone-bear"; }
function getAllocation(price, statState) {
  // Revised Hold / Maintain / Distribute Model.
  // Hold through R1, maintain through R2, distribute from R2 onward.
  if (price < YEARLY_PIVOTS.S3) return { core: 95, dry: 5, policy: "DEPLOY", tradeSize: "BUY 25–35%" };
  if (price < YEARLY_PIVOTS.S2) return { core: 90, dry: 10, policy: "DEPLOY", tradeSize: "BUY 15–25%" };
  if (price < YEARLY_PIVOTS.S1) return { core: 85, dry: 15, policy: "DEPLOY", tradeSize: "BUY 10–20%" };
  if (price < YEARLY_PIVOTS.P)  return { core: 80, dry: 20, policy: "DEPLOY", tradeSize: "BUY 5–10%" };
  if (price < YEARLY_PIVOTS.R1) return { core: 80, dry: 20, policy: "MAINTAIN", tradeSize: "NO TRADE" };
  if (price < YEARLY_PIVOTS.R2) return { core: 75, dry: 25, policy: "MAINTAIN", tradeSize: "NO TRADE / SELL 0–5%" };
  if (price < YEARLY_PIVOTS.R3) return { core: 65, dry: 35, policy: "PROTECT", tradeSize: "SELL 10–15%" };
  if (price < YEARLY_PIVOTS.R4) return { core: 45, dry: 55, policy: "PROTECT", tradeSize: "SELL 20–25%" };
  if (price < YEARLY_PIVOTS.R5) return { core: 25, dry: 75, policy: "PROTECT", tradeSize: "SELL 20–30%" };
  return { core: 10, dry: 90, policy: "PROTECT", tradeSize: "SELL TACTICAL" };
}

async function fetchJsonWithTimeout(url, timeoutMs = 5000) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, {
      signal: controller.signal,
      cache: "no-store",
      mode: "cors",
      headers: { "accept": "application/json" },
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } finally { clearTimeout(timeout); }
}
function buildCoinGeckoUrl(path, params = {}) {
  const url = new URL(`https://api.coingecko.com/api/v3/${path}`);
  Object.entries(params).forEach(([key, value]) => url.searchParams.set(key, value));
  url.searchParams.set("x_cg_demo_api_key", CG_DEMO_API_KEY);
  url.searchParams.set("_", String(Date.now()));
  return url.toString();
}
async function fetchCoinGeckoPrice(config) {
  const id = config.coingeckoId;
  const url = buildCoinGeckoUrl("simple/price", {
    ids: id,
    vs_currencies: "usd",
    include_last_updated_at: "true",
  });
  const data = await fetchJsonWithTimeout(url, 8000);
  const price = data && data[id] && Number(data[id].usd);
  if (!Number.isFinite(price) || price <= 0) throw new Error("Invalid live price response");
  return {
    price,
    source: "Live",
    lastUpdated: data[id].last_updated_at ? Number(data[id].last_updated_at) * 1000 : Date.now(),
  };
}
async function fetchCoinGeckoHistory(config) {
  const id = config.historyCoingeckoId || config.coingeckoId;
  const url = buildCoinGeckoUrl(`coins/${encodeURIComponent(id)}/market_chart`, {
    vs_currency: "usd",
    days: "365",
  });
  const data = await fetchJsonWithTimeout(url, 10000);
  const historyPoints = (data && data.prices ? data.prices : []).map((point) => ({ timestamp: Number(point[0]), price: Number(point[1]) }))
    .filter((point) => Number.isFinite(point.timestamp) && Number.isFinite(point.price) && point.price > 0);
  if (historyPoints.length < 30) throw new Error("Insufficient CoinGecko history");
  return { prices: historyPoints.map((point) => point.price), historyPoints };
}
function saveCache() {
  try {
    localStorage.setItem(`soxx_model_v1_1_live_cache_v2_${state.assetKey}`, JSON.stringify({ price: state.price, priceSource: state.priceSource, lastUpdated: state.lastUpdated, prices: state.prices, historyPoints: state.historyPoints }));
  } catch (_) {}
}
function loadCache(assetKey) {
  try {
    const raw = localStorage.getItem(`soxx_model_v1_1_cg_cache_${assetKey}`);
    if (!raw) return false;
    const cached = JSON.parse(raw);
    if (!cached || !Number.isFinite(cached.price)) return false;
    state.price = cached.price;
    state.priceSource = cached.priceSource || "Cached";
    state.lastUpdated = cached.lastUpdated || null;
    if (Array.isArray(cached.prices) && cached.prices.length >= 30) state.prices = cleanPrices(cached.prices).slice(-750);
    if (Array.isArray(cached.historyPoints) && cached.historyPoints.length >= 30) state.historyPoints = cached.historyPoints.filter((p) => p && Number.isFinite(p.timestamp) && Number.isFinite(p.price) && p.price > 0).slice(-750);
    refreshIndicators();
    return true;
  } catch (_) { return false; }
}
let refreshInFlight = false;
async function refreshPrice() {
  if (refreshInFlight) return;
  refreshInFlight = true;
  try {
    state.feedStatus = "UPDATING";
    state.warning = "";
    render();

    const config = ASSET_CONFIG[state.assetKey];
    const live = await fetchCoinGeckoPrice(config);

    state.price = live.price;
    state.priceSource = live.source;
    state.feedStatus = "LIVE";
    state.lastUpdated = live.lastUpdated;

    try {
      const history = await fetchCoinGeckoHistory(config);
      state.prices = history.prices.slice(-750);
      state.historyPoints = history.historyPoints.slice(-750);
    } catch (_) {
      state.prices.push(state.price);
      state.prices = cleanPrices(state.prices).slice(-750);
      state.historyPoints.push({ timestamp: Date.now(), price: state.price });
      state.historyPoints = state.historyPoints
        .filter((p) => p && Number.isFinite(p.timestamp) && Number.isFinite(p.price) && p.price > 0)
        .slice(-750);
    }

    refreshIndicators();
    saveCache();
  } catch (err) {
    const usedCache = loadCache(state.assetKey);
    state.feedStatus = usedCache ? "RETRYING" : "FALLBACK";
    state.priceSource = usedCache ? "Cached last price" : "Uploaded CSV fallback";
    state.warning = "";
    refreshIndicators();
  } finally {
    refreshInFlight = false;
    render();
  }
}
function render() {
  refreshIndicators();
  const zone = getZone(state.price);
  const statState = getStatState(state.zScore, state.percentB);
  const signal = getSignal(state.price, statState);
  const confidence = getConfidence(state.price, state.zScore, state.percentB);
  const band = getBand(confidence);
  const allocation = getAllocation(state.price, statState);
  const monthlyPivotLevel = Number.isFinite(state.monthlyPivot) ? state.monthlyPivot : YEARLY_PIVOTS.P;

  document.getElementById("feedLabel").textContent = `FEED ${state.feedStatus}${state.lastUpdated ? " " + new Date(state.lastUpdated).toLocaleTimeString() : ""}`;
  document.getElementById("priceSourceBox").textContent = (state.priceSource === "Live" || state.priceSource === "CoinGecko" || state.priceSource === "Live price feed") ? "" : state.priceSource;
  const warningBox = document.getElementById("warningBox");
  warningBox.textContent = state.warning || "";
  warningBox.style.display = state.warning ? "block" : "none";

  document.getElementById("priceBox").textContent = `$${format(state.price)}`;
  const regimeBox = document.getElementById("regimeBox");
  regimeBox.textContent = zone;
  regimeBox.className = toneClass(zone);
  document.getElementById("signalBox").textContent = signal;
  document.getElementById("confidenceBox").textContent = `${confidence}/100`;
  document.getElementById("bandBox").textContent = band;
  document.getElementById("monthlyPivotLevelBox").textContent = `$${format(monthlyPivotLevel)}`;
  const monthlyPivotBox = document.getElementById("monthlyPivotBox");
  monthlyPivotBox.textContent = getMonthlyPivotState(state.price);
  monthlyPivotBox.className = monthlyPivotToneClass(state.price);
  document.getElementById("zScoreBox").textContent = state.zScore !== null ? state.zScore.toFixed(2) : "—";
  document.getElementById("percentBBox").textContent = state.percentB !== null ? state.percentB.toFixed(2) : "—";

  document.getElementById("pivotRows").innerHTML = PIVOT_ORDER.map((k) => row(k, `$${format(YEARLY_PIVOTS[k])}`)).join("");
  document.getElementById("probabilityRows").innerHTML = PROBABILITY_TABLE.map((p) => row(p.level, `${p.prob.toFixed(1)}%`)).join("");
  document.getElementById("stateRows").innerHTML = [
    row("ASSET", ASSET_CONFIG[state.assetKey].label),
    row("REGIME", zone),
    row("SIGNAL", signal),
    row("1M PIVOT", getMonthlyPivotState(state.price)),
    row("STAT STATE", statState),
    row("Z-SCORE", state.zScore !== null ? state.zScore.toFixed(2) : "—"),
    row("BOLLINGER %B", state.percentB !== null ? state.percentB.toFixed(2) : "—"),
  ].join("");
  document.getElementById("allocationRows").innerHTML = [
    row("CORE", `${allocation.core}%`),
    row("DRY POWDER", `${allocation.dry}%`),
    row("POLICY", allocation.policy),
    row("TRADE SIZE", allocation.tradeSize),
  ].join("");
  document.getElementById("executionRows").innerHTML = [
    row("TRIM", "R2–R5"),
    row("HOLD", "P–R2"),
    row("BUY", "S2–P"),
  ].join("");
  document.getElementById("methodRows").innerHTML = [
    row("OVERSOLD", "Z < -1.5 · %B < 0.2"),
    row("OVERBOUGHT", "Z > 1.5 · %B > 0.8"),
    row("LIVE FEED", "COINGECKO"),
    row("PRICE HISTORY", "NASDAQ"),
  ].join("");
}

document.querySelectorAll(".asset-btn").forEach((btn) => btn.addEventListener("click", () => refreshPrice()));
loadCache(state.assetKey);
refreshIndicators();
render();

const REFRESH_MS = 120000;
let refreshTimer = window.setInterval(refreshPrice, REFRESH_MS);
setTimeout(refreshPrice, 500);
window.addEventListener("focus", refreshPrice);
window.addEventListener("online", refreshPrice);
document.addEventListener("visibilitychange", () => {
